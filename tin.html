var DATA = {"generatedAt":"2026-07-06","worldGeneratedAt":"2026-07-06","techGeneratedAt":"2026-07-04","worldNews":[{"date":"2026-07-06","category":"Thăm & Ký kết","title":"Ông Trump sẽ gặp Zelensky và lãnh đạo Syria al-Sharaa bên lề thượng đỉnh NATO ở Thổ Nhĩ Kỳ","summary":"Tổng thống Mỹ Donald Trump dự kiến hội đàm với Tổng thống Ukraine Volodymyr Zelensky và nhà lãnh đạo mới của Syria, ông al-Sharaa, bên lề hội nghị thượng đỉnh NATO tại Thổ Nhĩ Kỳ. Các cuộc gặp nhằm kéo sự chú ý trở lại xung đột Ukraine, đồng thời Washington cân nhắc vai trò khu vực của Syria thời hậu chuyển giao quyền lực.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/news/world/united-states-canada/article/3359500/trump-meet-ukraines-zelensky-and-syrias-sharaa-during-nato-summit-turkey","sourceDate":"2026-07-06"},{"date":"2026-07-05","category":"Thăm & Ký kết","title":"Ngoại trưởng Trung Quốc Vương Nghị công du Bắc Âu, kêu gọi Thụy Điển khôi phục lòng tin","summary":"Ngoại trưởng Trung Quốc Vương Nghị công du các nước Bắc Âu, kêu gọi Thụy Điển cùng gây dựng lại lòng tin song phương trong bối cảnh Liên minh châu Âu đang tranh luận về cách ứng phó với các thực tiễn thương mại của Bắc Kinh. Chuyến thăm phản ánh nỗ lực của Trung Quốc nhằm giữ kênh đối thoại với châu Âu giữa lúc căng thẳng thương mại gia tăng.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3359458/chinese-foreign-minister-calls-sweden-help-rebuild-trust-between-countries","sourceDate":"2026-07-05"},{"date":"2026-07-05","category":"Quân sự & Công nghệ","title":"Chiến hạm Nga cập cảng Thanh Đảo trước tập trận hải quân chung với Trung Quốc","summary":"Nhiều tàu chiến của Hải quân Nga đã cập cảng Thanh Đảo để chuẩn bị cho cuộc tập trận hàng hải chung với Trung Quốc, và Quân Giải phóng Nhân dân Trung Quốc tổ chức lễ đón chính thức. Động thái cho thấy hợp tác quân sự giữa Bắc Kinh và Moscow tiếp tục được đẩy sâu, đặc biệt trên hướng biển.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/news/china/military/article/3359479/russian-warships-dock-chinese-port-ahead-joint-sea-exercises","sourceDate":"2026-07-05"},{"date":"2026-07-05","category":"Chính trị","title":"Netanyahu nói vài làng Cơ Đốc giáo Lebanon \"xin sáp nhập\" vào Israel","summary":"Thủ tướng Israel Benjamin Netanyahu tuyên bố một số làng Cơ Đốc giáo ở Lebanon đã đề nghị được Israel bảo vệ thông qua sáp nhập vì \"lo sợ các phần tử Hezbollah\". Phát ngôn chưa được kiểm chứng và lập tức làm gia tăng căng thẳng quanh vấn đề biên giới Israel - Lebanon.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/news/world/middle-east/article/3359505/some-lebanese-christian-villages-asked-be-annexed-israel-netanyahu-says","sourceDate":"2026-07-05"},{"date":"2026-07-04","category":"Chính trị","title":"Bắc Kinh điều biên đội hải cảnh mới tuần tra vùng biển phía đông Đài Loan","summary":"Trung Quốc triển khai một biên đội hải cảnh mới tiến hành cái gọi là \"tuần tra chấp pháp thường lệ\" ở vùng biển phía đông Đài Loan, trong khi phía Đài Loan theo dõi sát chuyển động của đội tàu. Đây là bước gia tăng hiện diện của Bắc Kinh quanh hòn đảo, làm nóng thêm eo biển Đài Loan.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3359426/beijing-sends-new-coastguard-force-waters-east-taiwan","sourceDate":"2026-07-04"},{"date":"2026-07-03","category":"Kinh tế","title":"BYD vượt Tesla, giành lại ngôi đầu thị trường xe điện toàn cầu","summary":"Hãng xe Trung Quốc BYD đã vượt Tesla để giành lại vị trí số một về doanh số xe điện toàn cầu, nhờ lượng xuất khẩu ra nước ngoài tăng mạnh. Diễn biến cho thấy cuộc cạnh tranh trên thị trường xe điện thế giới ngày càng gay gắt, với lợi thế đang nghiêng về các nhà sản xuất Trung Quốc.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/business/china-business/article/3359287/chinas-byd-surpasses-tesla-regain-lead-global-ev-race","sourceDate":"2026-07-03"},{"date":"2026-07-03","category":"Kinh tế","title":"Trung Quốc bỏ ưu đãi thuế cho xe năng lượng mới từ năm 2027","summary":"Giới chức Trung Quốc thông báo sẽ chấm dứt các ưu đãi thuế cho xe năng lượng mới (NEV) và xe tiết kiệm năng lượng kể từ năm 2027. Đây là tín hiệu cho thấy Bắc Kinh bắt đầu rút dần trợ cấp nhà nước cho ngành ô tô sau giai đoạn bùng nổ, buộc doanh nghiệp phải cạnh tranh bằng thực lực.","sourceName":"SCMP","sourceUrl":"https://www.scmp.com/economy/china-economy/article/3359376/china-scrap-tax-breaks-nevs-and-energy-saving-vehicles-2027","sourceDate":"2026-07-03"}],"techNews":[{"date":"2026-07-03","category":"Lục quân","title":"Vệ binh Quốc gia Lục quân Mỹ nhận lô xe địa hình vùng cực CATV đầu tiên của BAE","summary":"BAE Systems bàn giao lô Xe Địa hình Mọi Thời tiết Lạnh (Cold Weather All-Terrain Vehicle, CATV) đầu tiên cho quân đội Mỹ, những chiếc đầu về Trường Tác chiến Sơn cước của Vệ binh Quốc gia bang Vermont. CATV phát triển từ nền tảng BvS10 Beowulf, thiết kế thân đôi khớp nối bánh xích cho khả năng vượt tuyết và lãnh nguyên với áp suất mặt đất chỉ 3,6 psi, tốc độ tới 40 dặm/giờ, tầm 400-1.000 km, chở 12 người, leo dốc 31 độ. Đây là chương trình hiện đại hóa tác chiến vùng cực, thay xe thập niên 1980 đã lỗi thời; đã giao 58 xe, còn 97 chiếc trong hợp đồng 278 triệu USD.","significance":"Bổ sung năng lực cơ động, tiếp vận và tản thương trong môi trường cực lạnh, phản ánh Mỹ tăng đầu tư cho tác chiến Bắc Cực giữa cạnh tranh vùng cực với Nga và Trung Quốc.","sourceName":"Army Recognition","sourceUrl":"https://www.armyrecognition.com/news/army-news/2026/u-s-army-national-guard-receives-first-bae-catv-vehicles-for-arctic-mountain-warfare-training","sourceDate":"2026-07-03"},{"date":"2026-07-03","category":"AI/Tự hành","title":"F-15EX bay cùng drone MQ-28 Ghost Bat và thử tiếp dầu tiền phương FARP tại Valiant Shield 2026","summary":"Không quân Mỹ công bố chi tiết đợt phối hợp người-máy (MUM-T) giữa tiêm kích F-15EX Eagle II và drone MQ-28 Ghost Bat trên biển Philippine trong tập trận Valiant Shield 2026. MQ-28 dùng khung máy bay bản sản xuất, gắn đầu dò hồng ngoại tìm-bám (IRST), và tham gia khoa mục thử nghiệm Điểm Tiếp dầu và Nạp vũ khí Tiền phương (FARP) ngày 28/6 với vận tải cơ HC-130J Combat King II cùng Đơn vị Tác chiến Thử nghiệm (EOU) lập tại căn cứ Nellis năm 2025. PACAF nói hệ thống không người lái \"nhân bội sức mạnh, mở rộng tầm với và hiệu quả của phi công\"; MQ-28 được cho là đóng vai thay thế thử nghiệm cho các máy bay chiến đấu cộng tác FQ-42 và FQ-44.","significance":"Cho thấy Mỹ đẩy nhanh tích hợp máy bay chiến đấu cộng tác (CCA) vào đội hình có người lái và thử nghiệm hậu cần tiền phương linh hoạt ở Thái Bình Dương, hướng tới tác chiến phân tán đối phó Trung Quốc.","sourceName":"The Aviationist","sourceUrl":"https://theaviationist.com/2026/07/03/f-15ex-mq-28-fly-together-valiant-shield-2026/","sourceDate":"2026-07-03"},{"date":"2026-07-02","category":"Tên lửa/Phòng thủ","title":"Hải quân Mỹ tìm tên lửa diệt radar thay thế cho AARGM-ER vừa ra mắt","summary":"Hải quân Mỹ khởi động sáng kiến Tên lửa Chế áp Phát xạ Tiên tiến (Advanced Emission Suppression Missile, AESM), phát Yêu cầu Thông tin (RFI) tìm một tên lửa diệt radar \"thiết kế chín muồi\" (TRL trên 6) tương thích các nền tảng F-35, F/A-18E/F Super Hornet và EA-18G Growler. Động thái diễn ra ngay khi loại AGM-88G AARGM-ER (Northrop Grumman sản xuất, Ý là đối tác phát triển) mới dự kiến vào biên chế tháng 9/2026 sau nhiều năm trễ hẹn. Hơn 150 quả đang tồn đơn đặt, Hải quân \"tạm dừng chiến lược\" mua sắm năm tài khóa 2027. Mục tiêu là mở rộng nền công nghiệp, giảm phụ thuộc một nhà thầu và tích trữ đủ cho xung đột cường độ cao với Trung Quốc.","significance":"Tìm phương án dự phòng cho tên lửa chế áp phòng không cho thấy Mỹ lo về nguồn cung và quy mô kho vũ khí then chốt trước kịch bản đối đầu Trung Quốc.","sourceName":"The War Zone","sourceUrl":"https://www.twz.com/air/navy-already-looking-for-alternatives-to-its-brand-new-aargm-er-radar-busting-missile","sourceDate":"2026-07-02"},{"date":"2026-07-02","category":"AI/Tự hành","title":"Không quân và Lực lượng Vũ trụ Mỹ hợp nhiều công cụ AI trong thử nghiệm chỉ huy tác chiến MASH","summary":"Khoảng 100 quân nhân Lực lượng Vũ trụ và Không quân Mỹ tham gia đợt Sprint Lợi thế Quyết định Đa miền cho Phối hợp Người-Máy (MASH) tại Las Vegas hồi tháng 5/2026 — lần đầu Lực lượng Vũ trụ góp mặt trong một thử nghiệm chỉ huy tác chiến bằng AI cấp cao. Chương trình hai tuần dùng mô hình ngôn ngữ lớn, học máy, quy trình tác tử (agentic) và nền tảng dữ liệu để xử lý bài toán trên các miền không, vũ trụ, mạng, biển và bộ. Sáu nhóm phần mềm công nghiệp phối hợp với quân đội trên ba chức năng: đề xuất hành động đánh mục tiêu, xếp hạng năng lực theo hiệu ứng, và xác định nguồn lực cần thêm. Một sĩ quan cho biết công cụ giúp hoàn thành \"thêm năm nhiệm vụ trở lên\" trong thời gian trước đây chỉ làm được một.","significance":"Đặt nền cho Mạng Tác chiến của Bộ Không quân (DAF Battle Network) và tích hợp tác chiến đa miền, cho thấy Mỹ đẩy AI vào vòng ra quyết định chỉ huy để tăng tốc độ tác chiến.","sourceName":"Air & Space Forces Magazine","sourceUrl":"https://www.airandspaceforces.com/guardians-airmen-ai-battle-management-experiment/","sourceDate":"2026-07-02"},{"date":"2026-07-02","category":"Drone/UAV","title":"Bộ Tư lệnh Tác chiến Đặc biệt Mỹ tìm đạn tuần kích phóng từ máy bay cánh cố định","summary":"Văn phòng Điều hành Chương trình Cánh cố định của Bộ Tư lệnh Tác chiến Đặc biệt Mỹ (USSOCOM) nghiên cứu thị trường cho một Đạn Tuần kích Đường không (Air Loitering Munition, ALM) phóng từ máy bay cánh cố định của đặc nhiệm. Đạn phải phóng qua Ống phóng Chung (Common Launch Tube) hoặc giá BRU-71/78, nặng dưới 95 pound, tầm tối thiểu 75 hải lý tới điểm tuần kích, bay lượn ít nhất 40 phút ở độ cao 500-3.000 feet, tốc độ tấn công trên 100 knot, mang đầu dò thụ động kèm nhận dạng mục tiêu tự động. Hệ thống phải tương thích lõi tự hành FANTOM Core của chính phủ. Hạn nộp đề xuất là 27/7/2026.","significance":"Bổ sung năng lực tấn công tuần kích tầm xa, giá rẻ cho đặc nhiệm, phản ánh xu hướng đưa vũ khí tự hành nhận dạng mục tiêu vào tác chiến hiện đại.","sourceName":"Soldier Systems Daily","sourceUrl":"https://soldiersystems.net/2026/07/02/ussocom-seeks-air-loitering-munition-for-use-with-fixed-wing-aircraft/","sourceDate":"2026-07-02"},{"date":"2026-07-02","category":"Lục quân","title":"Lục quân Mỹ dùng AI phát hiện vật cản nổ, hiện đại hóa mở đường cho xe cơ giới","summary":"Trung tâm C5ISR của Lục quân Mỹ (Fort Belvoir, Virginia) phát triển Tải trọng Đa nhiệm Mặt đất (Ground-based Multi-Mission Payload, GMMP) dùng trí tuệ nhân tạo tự động phát hiện vật cản nổ trên chiến trường. Mô hình AI nhận diện, phân loại và báo cáo mối nguy nổ theo thời gian thực, biến hàng giờ quét thủ công thành phân tích tức thời, giúp phát hiện nguy hiểm từ khoảng cách an toàn. Hệ thống tích hợp bộ công cụ Tactical Assault Kit tạo bức tranh tác chiến chung cho kíp xe và sở chỉ huy, dùng kiến trúc AI mở do quân đội tự sở hữu. Nguyên mẫu đã lắp trên xe quân sự, chó robot và xe tiếp vận robot 8 bánh SMET.","significance":"Tự động hóa dò vật cản nổ bằng AI trên các nền tảng có và không người lái giúp giảm rủi ro cho công binh và tăng tốc mở đường đột phá.","sourceName":"Soldier Systems Daily","sourceUrl":"https://soldiersystems.net/2026/07/02/army-researchers-modernize-breaching-for-ground-platforms-through-ai-enabled-explosive-hazard-detection/","sourceDate":"2026-07-02"},{"date":"2026-07-02","category":"Tên lửa/Phòng thủ","title":"Startup quốc phòng Mỹ lấy linh kiện từ ngành ô tô, dầu đá phiến để tăng tốc sản xuất vũ khí","summary":"Các startup quốc phòng Mỹ đang rút ngắn thời gian và chi phí sản xuất vũ khí bằng cách lấy linh kiện từ ngành ô tô và khai thác dầu đá phiến thay vì nhà cung ứng hàng không vũ trụ truyền thống. Castelion (định giá ~3 tỷ USD) mua chip FPGA từ ngành ô tô rẻ bằng một phần mười và nhanh gấp sáu lần, dùng ống chịu áp lực cao của ngành fracking; hãng vừa trúng hợp đồng hơn 500 vũ khí siêu thanh. Anduril mua máy trộn không cánh của ngành dược, tăng sản lượng hơn 10 lần. X-Bow in 3D rút chu kỳ từ 3-6 năm còn 12 tháng; Firehawk giảm sản xuất nhiên liệu tên lửa từ 60 ngày còn 7 giờ. Lầu Năm Góc rót 53 tỷ USD tăng năng lực sản xuất tên lửa.","significance":"Chuyển nguồn cung sang các ngành dân sự quy mô lớn giúp Mỹ hạ giá thành và tăng tốc bổ sung kho vũ khí đã cạn vì Ukraine và Trung Đông.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/02/defense-startups-raid-auto-and-fracking-sectors-for-parts-to-speed-weapons-output/","sourceDate":"2026-07-02"},{"date":"2026-07-01","category":"Drone/UAV","title":"Bộ trưởng Quốc phòng Mỹ lập chức quản lý tập trung toàn bộ hệ thống không người lái","summary":"Bộ trưởng Quốc phòng Pete Hegseth lập chức Quản lý Danh mục Báo cáo Trực tiếp về Hệ thống Không người lái Tấn công và Phòng thủ (DRPM-UxS) nhằm hợp nhất mảng drone và tự hành đang phân tán của Bộ Quốc phòng về một đầu mối. Trong bản ghi nhớ ngày 29/6, Hegseth gọi hệ thống không người lái là \"đổi mới chiến trường hệ trọng nhất thế hệ này\". Người phụ trách làm \"đầu mối tích hợp liên quân\" cho drone nhóm 1-3, phương tiện mặt nước và ngầm, hệ thống mặt đất, phần mềm bầy đàn AI và năng lực chống drone; báo cáo lên Thứ trưởng Stephen Feinberg, tiếp quản JIATF-401 và Nhóm Tác chiến Tự hành DAWG. Lý do là Mỹ bị đánh giá triển khai chậm giữa lúc sản xuất drone toàn cầu bùng nổ.","significance":"Tập trung chỉ huy mảng không người lái cho thấy Lầu Năm Góc quyết đẩy nhanh trang bị drone quy mô lớn, học từ Ukraine và Trung Đông.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/01/hegseth-realigning-unmanned-systems-programs-under-new-drone-boss/","sourceDate":"2026-07-01"},{"date":"2026-07-01","category":"AI/Tự hành","title":"AWS và Anduril ra mắt trung tâm dữ liệu chiến thuật trên chợ đám mây của Lầu Năm Góc","summary":"Amazon Web Services và Anduril cùng ra mắt giải pháp trung tâm dữ liệu chiến thuật cho tác chiến ở nơi xa hoặc mất kết nối, kết hợp AWS Outposts (điện toán, lưu trữ đám mây) với trung tâm dữ liệu cơ động bền chắc Menace-I của Anduril. Hệ thống cho chỉ huy và lực lượng phân tán truy cập \"điện toán, lưu trữ và AI cấp đám mây\" mà không cần hạ tầng tập trung hay kết nối ổn định, phục vụ đơn vị hoạt động trong môi trường liên lạc bị chặn hoặc suy giảm. Sản phẩm đã lên chợ Năng lực Đám mây Chiến binh Liên hợp (JWCC) và theo AWS đã được dùng trong chiến dịch Epic Fury ở Trung Đông.","significance":"Đưa điện toán và AI cấp đám mây ra tuyến đầu phù hợp xu hướng phân tán lực lượng, giúp đơn vị nhỏ vẫn giữ năng lực xử lý dữ liệu khi mất kết nối.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/01/aws-anduril-debut-new-tactical-data-center-cloud-offering/","sourceDate":"2026-07-01"},{"date":"2026-07-01","category":"Hải quân","title":"HII khởi công chế tạo khu trục hạm Flight III USS John F. Lehman (DDG 137)","summary":"Tập đoàn Huntington Ingalls Industries (HII) khởi công chế tạo khu trục hạm lớp Arleigh Burke Flight III thứ bảy là USS John F. Lehman (DDG 137) từ ngày 29/6 tại xưởng Ingalls. Thay vì tập trung ở Pascagoula, HII áp dụng mô hình đóng tàu phân tán, huy động sáu xưởng đối tác ở Texas, Louisiana, Mississippi và Florida làm các khối kết cấu, dự kiến thuê ngoài hơn 2,5 triệu giờ công trong năm 2026 để mở rộng năng lực. DDG 137 trang bị radar AN/SPY-6(V)1 và hệ thống chiến đấu Aegis Baseline 10 đối phó các mối đe dọa thế kỷ 21. Hải quân đang đóng năm chiếc Flight III, thêm bảy chiếc trong giai đoạn chuẩn bị.","significance":"Mô hình đóng tàu phân tán nhằm tăng năng lực và sức bền công nghiệp cho hạm đội tàu mặt nước Mỹ giữa áp lực bổ sung lực lượng.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/hii-begins-fabrication-of-flight-iii-destroyer-john-f-lehman-ddg-137/","sourceDate":"2026-07-01"},{"date":"2026-07-01","category":"Vũ trụ","title":"Lực lượng Vũ trụ Mỹ diễn tập vệ tinh cơ động áp sát trong sứ mệnh Victus Haze","summary":"Sứ mệnh Không gian Phản ứng Chiến thuật thứ hai của Lực lượng Vũ trụ Mỹ là Victus Haze phóng ngày 19/6 bằng tên lửa Electron của Rocket Lab từ New Zealand, chỉ 16 giờ 42 phút sau khi nhận lệnh. Sứ mệnh diễn tập tác chiến giữa hai vệ tinh: Jackal của True Anomaly và Puma của Rocket Lab. Puma sẵn sàng cơ động sau 37 giờ, sớm hơn mốc 72 giờ tới 34 giờ; Jackal hoàn tất nhiệm vụ đầu tiên trong 61 giờ, bay vòng quanh Puma đóng vai \"mục tiêu không hợp tác\", thực hiện đốt động cơ chính xác, bám bắt vòng kín, chỉ hướng, chụp ảnh và định danh. Space Safari còn ba sứ mệnh Victus tiếp theo trong hai năm.","significance":"Cơ động áp sát nhanh trên quỹ đạo là năng lực cốt lõi cho nhận thức không gian và tác chiến vũ trụ, cho thấy Mỹ đẩy mạnh phản ứng nhanh trên quỹ đạo.","sourceName":"Air & Space Forces Magazine","sourceUrl":"https://www.airandspaceforces.com/victus-haze-mission-rapid-maneuvers-satellites/","sourceDate":"2026-07-01"},{"date":"2026-06-30","category":"Không quân","title":"Không quân Mỹ lần đầu công bố máy bay ném bom B-2 phóng tên lửa diệt hạm LRASM","summary":"Không quân Mỹ lần đầu tiết lộ một máy bay ném bom tàng hình B-2 Spirit đã phóng thành công tên lửa diệt hạm tầm xa AGM-158C LRASM trong khoa mục bắn đạn thật ngày 27/6 thuộc tập trận Valiant Shield 26 trên biển Philippine, bắc quần đảo Mariana. Quả tên lửa đánh chìm tàu vận tải đổ bộ đã loại biên USS Juneau ở cự ly hơn 200 hải lý trong khoa mục đánh chìm mục tiêu (SINKEX). Năng lực này mở rộng mạnh khả năng đánh biển của B-2, tầm xa hơn hẳn bom QUICKSINK thử năm 2024. B-2 thuộc Không đoàn Ném bom 509 (Whiteman) được lắp LRASM ngày 22/6 trước khi triển khai tới Guam. Tàu ngầm Nhật và không quân hải quân Mỹ cùng tham gia tập trận.","significance":"Kết hợp tầm bay xa và tàng hình của B-2 với tên lửa diệt hạm tầm xa tạo mối đe dọa mới với hạm đội đối phương ở Thái Bình Dương, hướng thẳng vào cạnh tranh với Trung Quốc.","sourceName":"Air & Space Forces Magazine","sourceUrl":"https://www.airandspaceforces.com/b-2-fires-ship-killing-cruise-missile-lrasm/","sourceDate":"2026-06-30"}],"analyses":[{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân sự Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Morris lập luận giới phân tích phương Tây đang thiếu hụt hiểu biết nghiêm trọng về chiến lược quân sự Trung Quốc do hai vấn đề chồng lấn: Quân Giải phóng Nhân dân siết quyền tiếp cận các văn bản học thuyết cốt lõi (đa số có từ 2006-2013), và Bắc Kinh mới áp kiểm soát internet chặt với thông tin quân sự. Hệ quả là phân tích phải dựa vào nguồn cũ hoặc phỏng đoán về cách Trung Quốc phản ứng trong xung đột, làm tăng nguy cơ tính toán sai và leo thang.","takeaway":"Morris đề xuất khôi phục một cơ quan công khai kiểu Foreign Broadcast Information Service để hệ thống hóa dịch và phổ biến tài liệu quân sự Trung Quốc, cải thiện phân tích răn đe và giảm rủi ro ngộ nhận.","url":"https://warontherocks.com/2026/07/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-01","region":"Châu Mỹ","topic":"An ninh kinh tế Bắc Mỹ","outlet":"CSIS","author":"Diego Marroquín Bitar","title":"Pháo đài Bắc Mỹ: vai trò của Mexico trong bảo đảm tương lai kinh tế khu vực","summary":"Báo cáo cho rằng Mexico là trung tâm của an ninh kinh tế Bắc Mỹ: là đối tác thương mại lớn nhất và trung tâm sản xuất của Mỹ, nhưng Mexico \"phụ thuộc nặng vào linh kiện Trung Quốc và thiếu công cụ sàng lọc đầu tư lẫn kiểm soát xuất khẩu\" mà các đối tác đã có. Kỳ rà soát USMCA 2026 mở cơ hội dựng khung thể chế về sàng lọc, kiểm soát xuất khẩu và quản trị rủi ro chuỗi cung, để khu vực mở bên trong nhưng giữ ranh giới chọn lọc theo tiêu chuẩn với bên ngoài.","takeaway":"Xây cơ chế thể chế vững cho sàng lọc đầu tư và kiểm soát xuất khẩu tại Mexico là điều kiện then chốt cho sức bền kinh tế và tự chủ chiến lược của Bắc Mỹ.","url":"https://www.csis.org/analysis/fortress-north-america-mexicos-role-securing-regions-economic-future"},{"date":"2026-07-01","region":"Đông Á","topic":"Răn đe Đài Loan","outlet":"War on the Rocks","author":"Jay McVann","title":"Ba điều chưa từng: để đánh chiếm Đài Loan, Trung Quốc phải ba lần lập lịch sử quân sự","summary":"Jay McVann lập luận một cuộc xâm lược Đài Loan buộc Trung Quốc đồng thời thực hiện ba chiến dịch chưa từng có tiền lệ: đổ bộ đường biển trước tên lửa diệt hạm ven bờ, đổ bộ đường không quy mô lớn xuyên lưới phòng không hiện đại, và đột kích trực thăng tầm xa. Đài Loan không cần đánh bại toàn bộ, chỉ cần phá vỡ chuỗi tác chiến khớp nối chặt: một khẩu đội tên lửa sống sót có thể bẻ gãy đợt đổ bộ bằng cách diệt tàu vận tải then chốt. Vì vậy Đài Loan nên dồn đầu tư vào tên lửa phòng thủ bờ biển và phòng không tầm thấp.","takeaway":"Răn đe không dựa vào việc Bắc Kinh chắc chắn thất bại, mà dựa vào việc Bắc Kinh nghi ngờ khả năng thành công của chính mình.","url":"https://warontherocks.com/the-three-nevers-to-invade-taiwan-china-would-have-to-make-military-history-thrice/"},{"date":"2026-07-01","region":"Châu Âu/NATO","topic":"Chiến sự Nga-Ukraine","outlet":"CSIS","author":"Seth G. Jones & Riley McCabe","title":"Máu và của cải của Nga: cái giá phình to của cuộc chiến Putin","summary":"Seth G. Jones và Riley McCabe cho rằng Nga đang gánh cái giá không bền vững ở Ukraine dù vẫn tiếp tục tấn công. Báo cáo ghi nhận khoảng 450.000 lính Nga tử trận và 1,4 triệu thương vong, vượt xa năng lực tuyển quân. Đà tiến chững lại, thậm chí mất lãnh thổ ròng trong mùa xuân 2026, với tốc độ tiến trung bình chỉ 50-90 mét mỗi ngày. Các tác giả khuyến nghị Mỹ và châu Âu siết mạnh thực thi trừng phạt để khiến việc tiếp tục chiến tranh trở nên bất khả thi với Putin, qua đó buộc tới một dàn xếp thương lượng thay vì chiến thắng dứt điểm của Ukraine.","takeaway":"Tổn thất nhân mạng khổng lồ và đà tiến đình trệ khiến sức ép kinh tế trở thành đòn bẩy chính buộc Nga vào bàn đàm phán.","url":"https://www.csis.org/analysis/russian-blood-and-treasure-ballooning-costs-putins-war"},{"date":"2026-07-01","region":"Ấn Độ Dương - Thái Bình Dương","topic":"An ninh hàng hải","outlet":"CSIS","author":"Brian Hart và cộng sự","title":"Những eo biển bất ổn: phân tích các điểm nghẽn thương mại ở Biển Đông","summary":"Nhóm học giả CSIS phân tích tám eo biển ở Biển Đông, nơi 6,4 nghìn tỷ USD thương mại đi qua mỗi năm; riêng eo Malacca và eo Đài Loan mỗi eo gánh khoảng 2,4 nghìn tỷ USD, tức 21% thương mại hàng hải toàn cầu. Xung đột quân sự, nhất là quanh Đài Loan, là rủi ro gián đoạn lớn nhất. Nghịch lý là Trung Quốc dễ tổn thương qua eo Đài Loan hơn eo Malacca, trong khi các đồng minh Mỹ như Nhật, Hàn và Philippines phụ thuộc nặng vào các tuyến này. Bài dựng bức tranh chi tiết về mức độ phụ thuộc khác nhau, thách thức nhận thức thông thường về tầm quan trọng của từng điểm nghẽn.","takeaway":"Bản đồ phụ thuộc chi tiết cho thấy chính Trung Quốc chịu rủi ro chuỗi cung ứng lớn qua eo Đài Loan, một dữ kiện định hình tính toán răn đe khu vực.","url":"https://www.csis.org/analysis/south-china-sea-trade-chokepoints"},{"date":"2026-06-29","region":"Toàn cầu","topic":"Công nghiệp quốc phòng & liên minh","outlet":"War on the Rocks","author":"Justin Massie & Srdjan Vucetic","title":"Liên minh công nghiệp quốc phòng mà Washington đang vứt bỏ","summary":"Justin Massie và Srdjan Vucetic cảnh báo quan hệ công nghiệp quốc phòng Mỹ - Canada đang xói mòn do sức ép cưỡng bức của chính quyền Trump. Thay vì thúc đẩy hội nhập sâu, việc Washington đơn phương đình chỉ Ủy ban Phòng thủ Chung Thường trực 86 năm tuổi và áp chính sách thương mại trừng phạt đẩy Canada sang phòng bị: đa dạng hóa đối tác với EU, đồng minh Ấn Độ Dương - Thái Bình Dương và tự phát triển năng lực. Các tác giả lập luận sức mạnh công nghiệp quốc phòng thế kỷ 21 không thể dựng lại bằng cưỡng bức, vì đồng minh cần lòng tin chính trị.","takeaway":"Vũ khí hóa sự phụ thuộc bất đối xứng với đồng minh có nguy cơ tự phá hủy chính mạng lưới công nghiệp mà sức bền quốc phòng phương Tây dựa vào.","url":"https://warontherocks.com/cogs-of-war/the-defense-industrial-alliance-washington-is-throwing-away/"},{"date":"2026-06-28","region":"Đông Á","topic":"Cạnh tranh Mỹ - Trung","outlet":"Defense One","author":"Peter W. Singer","title":"Quân đội Trung Quốc đang nghĩ gì về cuộc chiến Iran?","summary":"Peter W. Singer dựng một bản ghi nhớ giả định của Quân Giải phóng Nhân dân Trung Quốc (PLA) mổ xẻ những điểm yếu của Mỹ bộc lộ qua cuộc chiến với Iran. Bản phân tích nêu năm tử huyệt chiến lược: giỏi chiến thuật nhưng không đạt thắng lợi chiến lược, quan hệ đồng minh xói mòn, chi phí đạn dược không bền vững, chiến tranh nhận thức nội bộ, và tâm lý sợ thương vong dễ bị khai thác. Bài kèm một phản biện giả định của Lầu Năm Góc nhấn mạnh ưu thế quân sự và ý chí chiến đấu, tạo tương phản sắc nét giữa hai góc nhìn.","takeaway":"Mỹ thắng từng trận nhưng có thể thua thế chiến lược do tiêu hao nguồn lực không bền vững và chia rẽ nội bộ — góc nhìn từ phía Trung Quốc đáng để tự soi.","url":"https://www.defenseone.com/ideas/2026/06/what-chinese-military-thinking-about-iran-war/414482/"},{"date":"2026-06-27","region":"Châu Âu/NATO","topic":"Chiến sự Nga-Ukraine","outlet":"ISW","author":"Institute for the Study of War","title":"Đánh giá chiến dịch tấn công của Nga: chiến tuyến Ukraine ngày 27/6","summary":"Báo cáo mới nhất của Viện Nghiên cứu Chiến tranh (Institute for the Study of War, ISW) lập bản đồ quyền kiểm soát lãnh thổ của Nga và Ukraine trên nhiều hướng tác chiến tính tới ngày 27 tháng 6. Bản cập nhật đánh giá chi tiết địa hình ở các khu vực trọng yếu gồm Sumy, tỉnh Kharkiv, hướng sông Oskil, tỉnh Donetsk, Vành đai Pháo đài, Slovyansk, Pokrovsk, Zaporizhia và Kherson. Phân tích phản ánh các hoạt động tác chiến cơ động thông thường đang tiếp diễn ở miền đông và miền nam Ukraine. ISW chỉ dùng tin nguồn mở và ảnh vệ tinh thương mại.","takeaway":"ISW duy trì đánh giá hằng ngày về tác chiến của Nga, cung cấp bản đồ và phân tích chuẩn dựa hoàn toàn vào thông tin công khai.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment"},{"date":"2026-06-26","region":"Toàn cầu","topic":"Vũ khí hạt nhân","outlet":"War on the Rocks","author":"Paul Amato","title":"Không hề tưởng tượng: khoảng trống răn đe là có thật và Mỹ cần vũ khí hạt nhân uy lực thấp","summary":"Paul Amato bảo vệ việc Mỹ phát triển năng lực hạt nhân uy lực thấp trước những ý kiến cho rằng \"khoảng trống răn đe\" chỉ là tưởng tượng. Ông lập luận các bản Đánh giá Thế trận Hạt nhân năm 2018 và 2022, Ủy ban Thế trận Chiến lược và Quốc hội đều độc lập xác định những thách thức tác chiến có thật, đòi hỏi lực lượng hạt nhân chiến trường bổ sung để cân bằng ưu thế vũ khí hạt nhân chiến thuật của Nga. Tác giả nhấn mạnh quy trình rà soát kỹ lưỡng và trách nhiệm tranh luận công khai của cựu quan chức về các mối đe dọa an ninh.","takeaway":"Khoảng trống răn đe nhằm đối phó ưu thế hạt nhân chiến thuật của Nga phản ánh phân tích chiến lược thực chất, không phải chính sách gượng ép.","url":"https://warontherocks.com/not-imaginary-the-deterrence-gap-is-real-and-america-needs-low-yield-nukes/"},{"date":"2026-06-26","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Đông Nam Á","outlet":"War on the Rocks","author":"Lucas Myers","title":"Đọc sai cuộc chiến Myanmar: thắng lợi gần đây của chính quyền quân sự chưa phải hồi kết","summary":"Dù chính quyền quân sự Myanmar lấy lại đà nhờ cưỡng bách tòng quân, drone hiện đại và sức ép của Trung Quốc lên các đồng minh kháng chiến, các thắng lợi lãnh thổ gần đây không bảo đảm chiến thắng tất yếu. Lực lượng Cách mạng Mùa xuân ủng hộ dân chủ vẫn kiểm soát từ một phần ba tới một nửa đất nước và cho thấy sức bền qua cơ cấu chỉ huy thống nhất đang hình thành cùng chiến thuật du kích. Cuộc xung đột ngày càng giống thế giằng co kéo dài hơn là một chiến thắng cận kề của chính quyền quân sự.","takeaway":"Phe kháng chiến còn đủ sức nên việc Mỹ vội công nhận ngoại giao chính quyền quân sự sẽ là đọc sai quỹ đạo bất định của cuộc chiến.","url":"https://warontherocks.com/misreading-myanmars-war-why-the-juntas-recent-gains-dont-mean-imminent-victory/"},{"date":"2026-06-26","region":"Châu Mỹ","topic":"Địa chính trị khu vực","outlet":"CSIS","author":"Henry Ziemer & Joseph Ruelas","title":"Venezuela hứng trận động đất tồi tệ nhất nhiều thập kỷ: điều gì tiếp theo?","summary":"Henry Ziemer và Joseph Ruelas phân tích trận động đất 24/6 (cường độ 7,2 và 7,5) vừa là thảm họa nhân đạo vừa là phép thử chính trị với chính quyền chuyển tiếp hậu Maduro của bà Delcy Rodríguez. Hàng loạt nước — Argentina, Chile, El Salvador, Brazil, Ấn Độ và châu Âu — cam kết viện trợ; Mỹ triển khai đội tìm kiếm cứu nạn và khí tài hải quân (USS Fort Lauderdale, USS Billings) do Bộ Tư lệnh miền Nam (SOUTHCOM) điều phối, Bộ Tài chính miễn trừng phạt cho các thực thể cứu trợ. Khủng hoảng thử thách chiến lược ba giai đoạn (ổn định - phục hồi - chuyển tiếp) của chính quyền Trump với Venezuela.","takeaway":"Nếu dồn cho tái thiết mà trì hoãn vô thời hạn tiến trình dân chủ, nỗ lực cứu trợ có thể vô tình củng cố quyền lực của bà Rodríguez và kích hoạt làn sóng di cư gây bất ổn khu vực.","url":"https://www.csis.org/analysis/venezuela-suffered-its-worst-earthquake-decades-what-comes-next"},{"date":"2026-06-24","region":"Toàn cầu","topic":"AI/Bán dẫn","outlet":"CSIS","author":"William Alan Reinsch","title":"Anthropic và thế lưỡng nan kiểm soát xuất khẩu","summary":"William Alan Reinsch phân tích thế lưỡng nan cốt lõi trong chính sách kiểm soát xuất khẩu công nghệ trí tuệ nhân tạo (AI) tiên tiến. Ông cho rằng cả siết chặt lẫn nới lỏng đều mang rủi ro lớn: biện pháp quá ngặt làm tổn hại ngành trong nước và thúc đối thủ nước ngoài tự phát triển công nghệ thay thế, trong khi kiểm soát lỏng lẻo để công nghệ nhạy cảm rơi vào tay đối thủ như Trung Quốc. Reinsch kết luận không có lời giải hoàn hảo, và cách tốt nhất là duy trì ưu thế công nghệ bằng đổi mới liên tục.","takeaway":"Không có đáp án \"đúng\" cho kiểm soát xuất khẩu chip AI; duy trì ưu thế bằng đổi mới liên tục là lựa chọn khả dĩ nhất.","url":"https://www.csis.org/analysis/anthropic-and-export-control-dilemma"},{"date":"2026-06-24","region":"Trung Đông","topic":"Ngoại giao","outlet":"CSIS","author":"Paul Salem","title":"Lebanon dưới bóng bản ghi nhớ Mỹ-Iran: rủi ro và cơ hội","summary":"Paul Salem lập luận rằng bản ghi nhớ Mỹ-Iran tạo cả rủi ro lẫn cơ hội cho Lebanon sau cuộc xung đột tàn khốc tháng 3 năm 2026. Ngoại giao một mặt có thể củng cố vị thế vũ trang của Hezbollah và sự chiếm đóng của Israel, mặt khác có thể mở đường cho Israel rút quân, Hezbollah giải giáp và khôi phục chủ quyền nhà nước Lebanon. Salem nhấn mạnh Lebanon phải chủ động tham gia đàm phán, cải cách thể chế trong nước và mở rộng quyền lực nhà nước để tận dụng thời cơ chiến lược này.","takeaway":"Sự chủ động ngoại giao và xây dựng nhà nước trong nước của Lebanon là then chốt để biến thời cơ đàm phán thành chủ quyền thực sự thay vì một lần ngừng bắn tạm thời.","url":"https://www.csis.org/analysis/lebanon-shadow-us-iran-mou-risks-and-opportunities"},{"date":"2026-06-23","region":"Trung Đông","topic":"Kinh tế quốc phòng","outlet":"CSIS","author":"Mark Cancian & Chris Park","title":"Cuộc chiến sắp tàn: chiến dịch Epic Fury đã tốn bao nhiêu?","summary":"Báo cáo của CSIS ước tính chiến dịch Epic Fury tốn khoảng 40 tỷ USD (khoảng 34-42 tỷ). Phân tích chia chi phí theo sáu nhóm: triển khai và rút quân (0,17 tỷ), đạn dược (26,1 tỷ, lớn nhất), nhịp tác chiến cao hơn (0,75 tỷ), tổn thất khí tài (1,8-3,5 tỷ), thiệt hại căn cứ (4,0-9,4 tỷ) và nhiên liệu (1,4 tỷ). Các cơ quan liên bang khác chịu thêm khoảng 1 tỷ USD. Con số này cao hơn ước tính ban đầu của Lầu Năm Góc nhưng thấp hơn vài tính toán dự báo kịch bản nghìn tỷ.","takeaway":"Chi phí thực của cuộc chiến vẫn gây tranh cãi, trong khi cơ chế tài trợ chưa rõ và Lầu Năm Góc cảnh báo thiếu hụt ngân sách nếu Quốc hội không hành động.","url":"https://www.csis.org/analysis/war-may-be-ending-what-did-epic-fury-cost"},{"date":"2026-06-16","region":"Đông Á","topic":"Ngoại giao","outlet":"CSIS","author":"Henrietta Levin & Daniel Castro Bonilla","title":"Ngoại giao Nam tiến: đánh giá \"ngoại giao tích hợp\" của Đài Loan sau 10 năm Chính sách Hướng Nam Mới","summary":"Bài phân tích xem xét chiến lược ngoại giao tích hợp của Đài Loan do Ngoại trưởng Lâm Gia Long khởi xướng năm 2024, áp dụng khắp Nam Á và Đông Nam Á nhân kỷ niệm 10 năm Chính sách Hướng Nam Mới. Chiến lược vận hành qua ba trụ cột: ngoại giao dựa trên giá trị, ngoại giao liên minh và ngoại giao kinh tế. Các tác giả lập luận rằng gắn kết kinh tế là nền tảng cho quan hệ khu vực, khi Đài Loan dùng chất bán dẫn, công nghệ và đầu tư để làm sâu sự phụ thuộc lẫn nhau với các đối tác như ASEAN và Ấn Độ. Hợp tác chính trị-an ninh còn hạn chế do khu vực dè dặt trước phản ứng của Trung Quốc.","takeaway":"Thành công của Đài Loan ở Nam và Đông Nam Á phụ thuộc vào lợi ích kinh tế cụ thể và quan hệ đối tác tin cậy hơn là lời kêu gọi dân chủ mang tính ý thức hệ.","url":"https://www.csis.org/analysis/southbound-diplomacy-assessing-taiwans-integrated-diplomacy-10th-anniversary-new"}]};
function esc(s){s=(s==null?'':''+s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtVN(s){if(!s)return '';var p=(''+s).split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):(''+s);}
function sortD(a){return (a||[]).slice().sort(function(x,y){return (''+(y.date||'')).localeCompare(''+(x.date||''));});}
var WMETA={'Chính trị':['🏛️','#d9605e'],'Kinh tế':['💹','#2bb3a3'],'Quân sự & Công nghệ':['🎖️','#5a86d0'],'Thăm & Ký kết':['🤝','#d9a441']};
function wmeta(c){return WMETA[c]||['🌍','#9aa6a0'];}
var RCOLOR={'Ấn Độ Dương - Thái Bình Dương':'#2bb3a3','Châu Âu/NATO':'#5a86d0','Trung Đông':'#d99a3e','Đông Á':'#d9605e','Nam Á':'#9a7ad0','Châu Phi':'#3fae6b','Châu Mỹ':'#6f7ad0','Bắc Cực':'#6fb8d9','Toàn cầu':'#9aa6a0'};
function rcolor(r){return RCOLOR[r]||'#9aa6a0';}
var CATMETA={'Không quân':'✈️','Hải quân':'⚓','Lục quân':'🪖','Drone/UAV':'🛩️','Siêu thanh':'🚀','Vũ trụ':'🛰️','AI/Tự hành':'🤖','Tên lửa/Phòng thủ':'🎯','Năng lượng định hướng':'⚡'};
var state={tab:'world',wcat:'Tất cả',areg:'Tất cả'};
function srcLink(o){var u=o.sourceUrl||o.url||'';var n=o.sourceName||o.outlet||u;return u?'<a class="src" href="'+esc(u)+'" target="_blank" rel="noreferrer">🔗 '+esc(n)+'</a>':(n?'<span class="meta">'+esc(n)+'</span>':'');}
function card(inner){return '<div class="card">'+inner+'</div>';}

function renderWorld(){
  var arr=sortD(DATA.worldNews);
  var cats=[];arr.forEach(function(a){if(a.category&&cats.indexOf(a.category)<0)cats.push(a.category);});
  var items=state.wcat==='Tất cả'?arr:arr.filter(function(a){return a.category===state.wcat;});
  var chips='<div class="chips"><span class="chip'+(state.wcat==='Tất cả'?' on':'')+'" data-wcat="Tất cả">Tất cả ('+arr.length+')</span>';
  cats.forEach(function(c){var m=wmeta(c);chips+='<span class="chip'+(state.wcat===c?' on':'')+'" data-wcat="'+esc(c)+'"><i class="dot" style="background:'+m[1]+'"></i>'+m[0]+' '+esc(c)+' ('+arr.filter(function(a){return a.category===c;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){var m=wmeta(a.category);
    return card('<div class="crow"><span class="badge" style="border-color:'+m[1]+';color:'+m[1]+'">'+m[0]+' '+esc(a.category||'Thời sự')+'</span><span class="date">'+fmtVN(a.date)+'</span></div><div class="title">'+esc(a.title)+'</div>'+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+'<div class="foot">'+srcLink(a)+'</div>');
  }).join(''):'<div class="empty">Chưa có tin thời sự.</div>';
  return '<div class="note">Tin <b>chính trị · kinh tế · quân sự-công nghệ · các chuyến thăm & ký kết</b> nổi bật trong <b>24 giờ qua</b> (giờ Mỹ), tổng hợp từ các báo lớn thế giới.</div>'+chips+'<div class="list">'+cards+'</div>';
}
function renderTech(){
  var arr=sortD(DATA.techNews);
  var cards=arr.length?arr.map(function(t){var ic=CATMETA[t.category]||'📰';
    return card('<div class="crow"><span class="badge" style="border-color:#5a86d0;color:#8fb0e0">'+ic+' '+esc(t.category||'Công nghệ')+'</span><span class="date">'+fmtVN(t.date)+'</span></div><div class="title">'+esc(t.title)+'</div>'+(t.summary?'<div class="sum">'+esc(t.summary)+'</div>':'')+(t.significance?'<div class="take">🎯 '+esc(t.significance)+'</div>':'')+'<div class="foot">'+srcLink(t)+'</div>');
  }).join(''):'<div class="empty">Chưa có tin.</div>';
  return '<div class="note"><b>Tổng hợp theo tuần</b> tin công nghệ quân sự Mỹ nổi bật (vũ khí, khí tài, chương trình, thử nghiệm). Cập nhật: '+fmtVN(DATA.techGeneratedAt||DATA.generatedAt)+'.</div><div class="list">'+cards+'</div>';
}
function renderAnalysis(){
  var arr=sortD(DATA.analyses);
  var regs=[];arr.forEach(function(a){if(a.region&&regs.indexOf(a.region)<0)regs.push(a.region);});
  var items=state.areg==='Tất cả'?arr:arr.filter(function(a){return a.region===state.areg;});
  var chips='<div class="chips"><span class="chip'+(state.areg==='Tất cả'?' on':'')+'" data-areg="Tất cả">Tất cả ('+arr.length+')</span>';
  regs.forEach(function(r){chips+='<span class="chip'+(state.areg===r?' on':'')+'" data-areg="'+esc(r)+'"><i class="dot" style="background:'+rcolor(r)+'"></i>'+esc(r)+' ('+arr.filter(function(a){return a.region===r;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){
    return card('<div class="crow"><span class="badge" style="border-color:#9a7ad0;color:#b79ae0">🧠 '+esc(a.topic||'Phân tích')+'</span>'+(a.region?'<span class="date">🌍 '+esc(a.region)+'</span>':'')+'</div><div class="title">'+esc(a.title)+'</div>'+(a.takeaway?'<div class="take">💡 '+esc(a.takeaway)+'</div>':'')+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.outlet||'')+(a.author?' · '+esc(a.author):'')+(a.date?' · '+fmtVN(a.date):'')+'</span>'+srcLink(a)+'</div>');
  }).join(''):'<div class="empty">Chưa có bài phân tích.</div>';
  return '<div class="note">Phân tích, báo cáo chiến lược từ các viện nghiên cứu (think tank) uy tín. Lọc theo khu vực.</div>'+chips+'<div class="list">'+cards+'</div>';
}
function content(){return state.tab==='tech'?renderTech():state.tab==='analysis'?renderAnalysis():renderWorld();}
function render(){
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thời sự'],['tech','📰 Công nghệ QS Mỹ'],['analysis','🧠 Phân tích']];
  var h='<div class="wrap">';
  h+='<header><div class="brand"><span class="logo">◎</span><div><h1>SA BÀN — Bản tin</h1><div class="sub">Quân sự · địa chính trị · kinh tế — tổng hợp từ nguồn mở</div></div></div><div class="upd">Cập nhật: '+stamp+'</div></header>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<span class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</span>';}).join('')+'</nav>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">SA BÀN — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Không đại diện quan điểm của bất kỳ tổ chức chính thức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg]'):null;if(!t)return;
  if(t.getAttribute('data-tab'))state.tab=t.getAttribute('data-tab');
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  render();
});
render();
</script>
